<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style.css">


</head>
<body>
    <nav>
    <div class="nav-left">
       
        <img src="assets/github-logo.png" alt="GitHub Logo" height="28" width="28">
        <h2>GitHub Issues Tracker</h2>
    </div>

    <div class="nav-right">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search issues...">
            <button id="searchBtn" style="display: none;"></button>
        </div>
        <button class="new-issue-btn">+ New Issue</button>
    </div>
</nav>


<div class="container">
    <div class="tabs-box">
        <div class="tabs">
            <button id="allBtn" class="tab active">All</button>
            <button id="openBtn" class="tab">Open</button>
            <button id="closedBtn" class="tab">Closed</button>
        </div>
    </div>

   
    <div class="stats">
        <div class="stats-info">
           
            <img src="assets/Aperture.png" alt="Icon" class="grid-icon" style="width: 38px; height: 38px; padding: 0; display: block; object-fit: contain;">
            <div>
                <h3><span id="issueCount">0</span> Issues</h3>
                <p>Track and manage your project issues</p>
            </div>
        </div>
        <div class="stats-legend">
            
            <span class="legend-item" style="gap: 8px;">
                <img src="assets/Open-Status.png" alt="Open Status Indicator" height="14" style="object-fit: contain;"> 
                <span id="openCount">Open: 0</span>
            </span>
            <span class="legend-item" style="gap: 8px;">
                <img src="assets/Closed- Status .png" alt="Closed Status Indicator" height="14" style="object-fit: contain;"> 
                <span id="closedCount">Closed: 0</span>
            </span>
        </div>
    </div>

    <div id="loader">Loading Issues...</div>
    <div id="issuesContainer" class="issues-grid"></div>
</div>




<dialog id="issueModal">
    <div id="modalContent"></div>
</dialog>


<script src="script.js"></script>


</body>
</html>
