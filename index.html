<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .brand-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }
        .login-instruction {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <div class="brand-logo">
            <img src="assets/github-logo.png" alt="GitHub Logo" height="64" width="64">
        </div>
        
        <h1>GitHub Issues Tracker</h1>
        <p class="login-instruction">Sign in using demo credentials</p>

        
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button id="loginBtn">Sign In</button>
        
         <div class="divider">OR</div>

       
        <div class="demo">
            <p><b>Username:</b> admin</p>
            <p><b>Password:</b> admin123</p>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
