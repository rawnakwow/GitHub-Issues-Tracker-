<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style.css">


</head>
<body>
    <nav>
    <div class="nav-left">
       
        <img src="assets/github-logo.png" alt="GitHub Logo" height="28" width="28">
